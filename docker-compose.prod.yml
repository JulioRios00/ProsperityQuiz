services:
  redis:
    image: redis:7-alpine
    container_name: quiz-funnel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - quiz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-funnel-backend
    restart: unless-stopped
    environment:
      FLASK_APP: "src.app:create_app()"
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    command: gunicorn "src.app:create_app()" --bind 0.0.0.0:5000 --workers 2 --timeout 60
    networks:
      - quiz-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api/v1
    container_name: quiz-funnel-frontend
    restart: unless-stopped
    networks:
      - quiz-network

  nginx:
    image: nginx:alpine
    container_name: quiz-funnel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - quiz-network

volumes:
  redis_data:
  nginx_certs:

networks:
  quiz-network:
    driver: bridge
