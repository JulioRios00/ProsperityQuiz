version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: quiz-funnel-db
    environment:
      POSTGRES_DB: quiz_funnel
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_funnel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quiz-funnel-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - quiz-network

  # Backend (Flask)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-funnel-backend
    environment:
      FLASK_APP: src.app
      FLASK_ENV: development
      DATABASE_URL: postgresql://quiz_user:${DB_PASSWORD:-quiz_password_change_me}@db:5432/quiz_funnel
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000 --reload
    networks:
      - quiz-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: quiz-funnel-frontend
    environment:
      VITE_API_URL: http://localhost:5001/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host
    networks:
      - quiz-network

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  quiz-network:
    driver: bridge
